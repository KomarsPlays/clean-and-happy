<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 70" width="100%" height="100%">
  <g fill="none" stroke="#4A3E3D" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <!-- ЛЕВЫЙ КОТИК -->
    <g transform="translate(10, 5)">
      <!-- Ушки -->
      <path d="M15,25 L10,5 L25,12" />
      <path d="M35,12 L50,5 L45,25" />
      <!-- Голова (дуга снизу) -->
      <path d="M10,25 Q10,55 30,55 Q50,55 50,25" />
      <!-- Глазки -->
      <path d="M20,32 Q23,35 26,32 M34,32 Q37,35 40,32" />
      <!-- Носик и ротик -->
      <path d="M30,38 L30,40 M26,42 Q30,45 30,42 Q30,45 34,42" />
      <!-- Щёчки (румянец) -->
      <ellipse cx="18" cy="40" rx="4" ry="2" fill="#FFAEC9" stroke="none" opacity="0.8" />
      <ellipse cx="42" cy="40" rx="4" ry="2" fill="#FFAEC9" stroke="none" opacity="0.8" />
    </g>

    <!-- ПРАВЫЙ КОТИК -->
    <g transform="translate(50, 15)">
      <!-- Ушки -->
      <path d="M15,25 L10,5 L25,12" />
      <path d="M35,12 L50,5 L45,25" />
      <!-- Голова -->
      <path d="M10,25 Q10,55 30,55 Q50,55 50,25" />
      <!-- Глазки (другая эмоция, например полосочки) -->
      <circle cx="23" cy="32" r="1.5" fill="#4A3E3D" stroke="none" />
      <circle cx="37" cy="32" r="1.5" fill="#4A3E3D" stroke="none" />
      <!-- Ротик -->
      <path d="M26,40 Q30,43 34,40" />
      <!-- Щёчки -->
      <ellipse cx="18" cy="40" rx="4" ry="2" fill="#FFAEC9" stroke="none" opacity="0.8" />
      <ellipse cx="42" cy="40" rx="4" ry="2" fill="#FFAEC9" stroke="none" opacity="0.8" />
    </g>
  </g>
</svg>
